<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1F2328;--g6:#4A4F57;--ink2:#636973;--g3:#C9CDD2;--g2:#E3E5E8;--g1:#F4F5F6;--g0:#fff;}
*{box-sizing:border-box;}
body{margin:0;background:var(--g1);color:var(--ink);font-family:Inter,system-ui,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;}
.gate{background:var(--g0);border:1px solid var(--g3);border-top:3px solid var(--ink);width:344px;max-width:92vw;padding:32px 28px 26px;text-align:center;}
.lock{width:38px;height:38px;margin:0 auto 14px;display:block;}
h1{font-weight:600;font-size:19px;margin:0 0 6px;color:var(--ink);letter-spacing:-.01em;}
p.sub{font-size:13px;color:var(--ink2);margin:0 0 20px;line-height:1.5;}
form{text-align:left;}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin-bottom:7px;}
input{width:100%;font-family:Inter;font-size:15px;color:var(--ink);background:var(--g0);border:1px solid var(--g3);padding:9px 11px;}
input:focus{outline:2px solid var(--ink);outline-offset:1px;border-color:var(--ink);}
button{margin-top:14px;width:100%;font-family:Inter;font-weight:600;font-size:14px;letter-spacing:.03em;color:var(--g0);background:var(--ink);border:1px solid var(--ink);padding:11px;cursor:pointer;transition:opacity .12s;}
button:hover{opacity:.88;}
.err{font-size:12.5px;color:#B42318;margin-top:12px;min-height:16px;text-align:center;}
</style>
</head>
<body>
<form class="gate" id="g" autocomplete="off">
  <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="#4A4F57" stroke-width="1.6" aria-hidden="true">
    <rect x="4.5" y="10.5" width="15" height="10" rx="1.2"/>
    <path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/>
    <circle cx="12" cy="15.2" r="1.3" fill="#4A4F57" stroke="none"/>
  </svg>
  <h1>Protected document</h1>
  <p class="sub">This document is password-protected. Enter the password to continue.</p>
  <label for="pw">Password</label>
  <input type="password" id="pw" autofocus autocomplete="current-password">
  <button type="submit">Unlock</button>
  <div class="err" id="err"></div>
</form>

ld(span);return null;}return span;}catch(e){return null;}\n  }\n  function rangeFromQuote(q,nth){\n    var ns=tnodes(),txt=ftext(ns),s=findNth(txt,q,nth||0);if(s<0)s=txt.indexOf(q);if(s<0)return null;\n    var a=locate(ns,s),b=locate(ns,s+q.length);if(!a||!b)return null;\n    var r=document.createRange();try{r.setStart(a.node,a.offset);r.setEnd(b.node,b.offset);}catch(e){return null;}return r;\n  }\n  function unwrap(id){var s=ROOT.querySelector('.fb-hl[data-fb=\"'+id+'\"]');if(s){var p=s.parentNode;while(s.firstChild)p.insertBefore(s.firstChild,s);p.removeChild(s);p.normalize();}}\n\n  function renderAll(){ notes().forEach(function(nt){ if(ROOT.querySelector('.fb-hl[data-fb=\"'+nt.id+'\"]'))return; var r=rangeFromQuote(nt.quote,nt.nth); if(r)paint(r,nt.id); }); updateCount(); }\n  function updateCount(){var n=notes().length;$('fb-count').textContent=n+' note'+(n===1?'':'s');$('fb-undo').disabled=!n;}\n\n  // ---- mode ----\n  function setMode(on){mode=on;tools.style.display=on?'flex':'none';$('fb-toggle').style.display=on?'none':'';hint.style.display=on?'block':'none';if(!on){closePop();addb.style.display='none';}}\n  $('fb-toggle').onclick=function(){setMode(true);};\n  $('fb-done').onclick=function(){setMode(false);};\n\n  // ---- selection -> add button ----\n  document.addEventListener('mouseup',function(e){\n    if(!mode)return; if(e.target.closest&&e.target.closest('#fb-bar,#fb-pop,#fb-add,#fb-hint'))return;\n    setTimeout(function(){\n      var sel=window.getSelection(); if(!sel||sel.isCollapsed||!sel.rangeCount){addb.style.display='none';return;}\n      var r=sel.getRangeAt(0); var q=sel.toString().replace(/\\s+/g,' ').trim();\n      if(q.length<2||!ROOT.contains(r.commonAncestorContainer)){addb.style.display='none';return;}\n      if(r.commonAncestorContainer.parentNode&&r.commonAncestorContainer.parentNode.closest&&r.commonAncestorContainer.parentNode.closest('svg')){addb.style.display='none';return;}\n      pending={range:r.cloneRange(),quote:q};\n gth)return; var last=arr[arr.length-1]; unwrap(last.id); arr.pop(); setNotes(arr); updateCount(); };\n\n  // ---- hover tooltip + click to edit ----\n  function noteById(id){var a=notes();for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null;}\n  document.addEventListener('mouseover',function(e){ var h=e.target.closest&&e.target.closest('.fb-hl'); if(!h)return; var nt=noteById(h.getAttribute('data-fb')); if(!nt)return; tip.textContent=nt.comment; tip.style.display='block'; var rc=h.getBoundingClientRect(); tip.style.top=(window.scrollY+rc.top-tip.offsetHeight-8)+'px'; tip.style.left=(window.scrollX+rc.left)+'px'; });\n  document.addEventListener('mouseout',function(e){ if(e.target.closest&&e.target.closest('.fb-hl'))tip.style.display='none'; });\n  document.addEventListener('click',function(e){ var h=e.target.closest&&e.target.closest('.fb-hl'); if(h&&mode){e.preventDefault();var nt=noteById(h.getAttribute('data-fb'));if(nt)openPop(nt.quote,nt.comment,nt.id,h);} });\n\n  // ---- download consolidated report ----\n  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/<\/g,'&lt;').replace(/>/g,'&gt;');}\n  function buildReport(){\n    var all=load(),m=meta(),pages=Object.keys(all),total=0,body='';\n    pages.forEach(function(pg){var arr=all[pg];if(!arr||!arr.length)return;\n      body+='<section><h2>'+esc(m[pg]||pg)+'<\/h2><div class=\"pg\">'+esc(pg)+'<\/div>';\n      arr.forEach(function(nt,i){total++;body+='<div class=\"note\"><div class=\"q\">\u201c'+esc(nt.quote)+'\u201d<\/div><div class=\"c\">'+esc(nt.comment)+'<\/div><\/div>';});\n      body+='<\/section>';});\n    var d=new Date(),stamp=d.toISOString().slice(0,10);\n    var html='<!doctype html><html><head><meta charset=\"utf-8\"><title>Feedback \u2014 Sysco working set<\/title>'\n      +'<style>body{font:15px/1.6 -apple-system,Inter,system-ui,sans-serif;color:#1F2328;background:#F4F5F6;margin:0;padding:40px 20px;}'\n      +'.wrap{max-width:760px;margin:0 auto;background:#fff;border:1px solid #C9CDD2;border-top:3px solid #008CD2;padding:34px 38px;}'\n      +'h1{font-size:23px;margin:0 0 4px;}.meta{color:#636973;font-size:13px;margin:0 0 26px;}'\n      +'h2{font-size:17px;margin:30px 0 2px;padding-top:18px;border-top:1px solid #E3E5E8;}section:first-of-type h2{border-top:0;padding-top:0;}'\n      +'.pg{font:11px/1 monospace;color:#9aa0a8;margin-bottom:14px;}'\n      +'.note{margin:0 0 16px;padding-left:14px;border-left:3px solid #ecc200;}'\n      +'.q{font:italic 14px/1.45 Georgia,serif;color:#636973;margin-bottom:5px;background:#fff7cc;display:inline;padding:1px 2px;}'\n      +'.c{margin-top:6px;}<\/style><\/head><body><div class=\"wrap\">'\n      +'<h1>Feedback on the Sysco working set<\/h1><p class=\"meta\">'+total+' note'+(total===1?'':'s')+' across '+pages.length+' page'+(pages.length===1?'':'s')+' \u00b7 exported '+stamp+'<\/p>'\n      +(total?body:'<p>No notes yet.<\/p>')+'<\/div><\/body><\/html>';\n    return {html:html,total:total};\n  }\n  $('fb-download').onclick=function(){\n    var r=buildReport(); if(!r.total){alert('No notes yet. Highlight some text and add a note first.');return;}\n    var blob=new Blob([r.html],{type:'text/html'}); var a=document.createElement('a');\n    a.href=URL.createObjectURL(blob); a.download='sysco-feedback-'+new Date().toISOString().slice(0,10)+'.html';\n    document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},100);\n  };\n  window.__fbBuildReport=buildReport; // for testing\n\n  renderAll();\n})();\n<\/script>";
function b2u(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0);});}
async function decrypt(pw){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2u(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(CT));
  return new TextDecoder().decode(pt);
}
