<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1F2328;--g6:#4A4F57;--ink2:#636973;--g3:#C9CDD2;--g2:#E3E5E8;--g1:#F4F5F6;--g0:#fff;}
*{box-sizing:border-box;}
body{margin:0;background:var(--g1);color:var(--ink);font-family:Inter,system-ui,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;}
.gate{background:var(--g0);border:1px solid var(--g3);border-top:3px solid var(--ink);width:344px;max-width:92vw;padding:32px 28px 26px;text-align:center;}
.lock{width:38px;height:38px;margin:0 auto 14px;display:block;}
h1{font-weight:600;font-size:19px;margin:0 0 6px;color:var(--ink);letter-spacing:-.01em;}
p.sub{font-size:13px;color:var(--ink2);margin:0 0 20px;line-height:1.5;}
form{text-align:left;}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin-bottom:7px;}
input{width:100%;font-family:Inter;font-size:15px;color:var(--ink);background:var(--g0);border:1px solid var(--g3);padding:9px 11px;}
input:focus{outline:2px solid var(--ink);outline-offset:1px;border-color:var(--ink);}
button{margin-top:14px;width:100%;font-family:Inter;font-weight:600;font-size:14px;letter-spacing:.03em;color:var(--g0);background:var(--ink);border:1px solid var(--ink);padding:11px;cursor:pointer;transition:opacity .12s;}
button:hover{opacity:.88;}
.err{font-size:12.5px;color:#B42318;margin-top:12px;min-height:16px;text-align:center;}
</style>
</head>
<body>
<form class="gate" id="g" autocomplete="off">
  <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="#4A4F57" stroke-width="1.6" aria-hidden="true">
    <rect x="4.5" y="10.5" width="15" height="10" rx="1.2"/>
    <path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/>
    <circle cx="12" cy="15.2" r="1.3" fill="#4A4F57" stroke="none"/>
  </svg>
  <h1>Protected document</h1>
  <p class="sub">This document is password-protected. Enter the password to continue.</p>
  <label for="pw">Password</label>
  <input type="password" id="pw" autofocus autocomplete="current-password">
  <button type="submit">Unlock</button>
  <div class="err" id="err"></div>
</form>

)||'';if(!n){n=(prompt('Your name (so Dimitri knows whose input this is):')||'').trim();if(n){try{localStorage.setItem(NKEY,n);}catch(e){}}}return n;}\n  function postTyped(payload){payload.reviewer=localStorage.getItem(NKEY)||'';payload.ts=Date.now();payload.pageTitle=document.title;payload.pagefile=PAGE;return fetch(ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});}\n  function sectionTitleOf(el){var secs=[].slice.call(ROOT.querySelectorAll('.sec-h')),best='';for(var i=0;i<secs.length;i++){if(secs[i].compareDocumentPosition(el)&Node.DOCUMENT_POSITION_FOLLOWING)best=norm(secs[i].textContent);}return best;}\n  function buildBox(kind,section,label){\n    var wrap=document.createElement('div');wrap.className='fbw-box';\n    var btn=document.createElement('button');btn.type='button';btn.className='fbw-btn';btn.textContent=label;\n    var panel=document.createElement('div');panel.className='fbw-panel';panel.style.display='none';\n    var ta=document.createElement('textarea');ta.placeholder='Type here\u2026';\n    var sub=document.createElement('button');sub.type='button';sub.className='fbw-btn fbw-primary';sub.textContent='Submit';\n    var msg=document.createElement('span');msg.className='fbw-msg';\n    var row=document.createElement('div');row.className='fbw-row';row.appendChild(sub);row.appendChild(msg);\n    panel.appendChild(ta);panel.appendChild(row);wrap.appendChild(btn);wrap.appendChild(panel);\n    btn.onclick=function(){var open=panel.style.display!=='none';panel.style.display=open?'none':'block';if(!open){reviewerName();ta.focus();}};\n    sub.onclick=function(){var t=ta.value.trim();if(!t){ta.focus();return;}reviewerName();sub.disabled=true;sub.textContent='Sending\u2026';\n      postTyped({type:kind,section:section,comment:t}).then(function(){sub.textContent='Submitted \u2713';ta.value='';setTimeout(function(){panel.style.display='none';sub.disabled=false;sub.textContent='Submit';},1200);}).catch(function(){sub.disabled=false;sub.textContent='Submit';msg.textContent='Could not send \u2014 try again.';});};\n    return wrap;\n  }\n  function buildRating(kind,item,labelText){\n    var rkey='sysco_fb_rate_'+PAGE+'|'+kind+'|'+item;\n    var wrap=document.createElement('div');wrap.className='fbw-rate';\n    var lab=document.createElement('span');lab.className='fbw-rlab';lab.textContent=labelText;wrap.appendChild(lab);\n    var prev=parseInt(localStorage.getItem(rkey)||'0',10);\n    for(var i=1;i<=5;i++){(function(nn){var b=document.createElement('button');b.type='button';b.className='fbw-star';b.textContent=nn;\n      b.onclick=function(){reviewerName();[].slice.call(wrap.querySelectorAll('.fbw-star')).forEach(function(x,idx){x.classList.toggle('on',idx<nn);});try{localStorage.setItem(rkey,String(nn));}catch(e){}postTyped({type:'rating',ratingType:kind,item:item,score:nn,section:sectionTitleOf(wrap)});};\n      wrap.appendChild(b);})(i);}\n    if(prev){[].slice.call(wrap.querySelectorAll('.fbw-star')).forEach(function(x,idx){x.classList.toggle('on',idx<prev);});}\n    return wrap;\n  }\n  function injectWidgets(){\n    // explicit in-flight / feedback boxes\n    [].slice.call(ROOT.querySelectorAll('[data-fb-box]')).forEach(function(el){if(el.__fbw)return;el.__fbw=1;var kind=el.getAttribute('data-fb-box');var section=el.getAttribute('data-fb-section')||sectionTitleOf(el);el.appendChild(buildBox(kind,section,kind==='inflight'?'\uff0b Add what you know':'\uff0b Add your input'));});\n    // Questions page: importance rating per question\n    if(PAGE.indexOf('Questions')>-1||/question/i.test(document.title)){[].slice.call(ROOT.querySelectorAll('.factor')).forEach(function(f){if(f.__fbr)return;f.__fbr=1;var item=norm((f.querySelector('.fn')||{textContent:''}).textContent);if(item)f.appendChild(buildRating('importance',item,'How important to Troy? 1\u20135'));});}\n    // deep-dive pages: conviction on hypotheses + comment button per section\n    var all=[] function b2u(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0);});}
async function decrypt(pw){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2u(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(CT));
  return new TextDecoder().decode(pt);
}
